# YOLO Detection Experiment Configuration
# Baseline FP32 inference on COCO using YOLOv8 models

experiment:
  name: "baseline_yolo_detection"
  description: "Baseline FP32 inference on COCO 2017 using YOLOv8 models"
  seed: 42
  device: "cuda"
  num_workers: 4  # Reduced to avoid worker warnings
  debug: false
  debug_samples: 100

models:
  - name: "yolov8n"
    architecture: "yolov8n"
    weights: "COCO"
    task: "detection"
    num_classes: 80  # YOLO uses 80 COCO classes (no background)
  
  - name: "yolov8m"
    architecture: "yolov8m"
    weights: "COCO"
    task: "detection"
    num_classes: 80

  # Uncomment to add more variants:
  # - name: "yolov8s"
  #   architecture: "yolov8s"
  #   weights: "COCO"
  #   task: "detection"
  #   num_classes: 80
  #
  # - name: "yolov8l"
  #   architecture: "yolov8l"
  #   weights: "COCO"
  #   task: "detection"
  #   num_classes: 80

datasets:
  coco:
    name: "coco"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/coco"
    split: "val2017"
    batch_size: 16  # YOLO is faster, can use larger batch
    shuffle: false
    num_workers: 4
    pin_memory: true

quantization:
  enabled: false  # Week 1: FP32 baseline only
  precision: ["int8"]
  calibration:
    method: "minmax"
    num_samples: 1000

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["baseline", "fp32", "detection", "yolo", "coco"]
    notes: "Baseline FP32 inference on COCO using YOLOv8"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_boxes: true
  save_scores: true
