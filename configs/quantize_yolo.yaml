# INT8 Quantization – YOLO Detection Models
# Uses Ultralytics export backends (OpenVINO/TensorRT) instead of torchao.

experiment:
  name: "quantize_yolo"
  description: "INT8 post-training quantization for YOLO models on COCO"
  seed: 42
  device: "cuda"
  num_workers: 4
  debug: false
  debug_samples: 100

models:
  - name: "yolov8n"
    architecture: "yolov8n"
    weights: "COCO"
    task: "detection"
    num_classes: 80

  - name: "yolov8m"
    architecture: "yolov8m"
    weights: "COCO"
    task: "detection"
    num_classes: 80

datasets:
  coco:
    name: "coco"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/coco"
    split: "val2017"
    batch_size: 256
    shuffle: false
    num_workers: 4
    pin_memory: true

quantization:
  enabled: true
  # YOLO path supports INT8 via export backends.
  # Use yolo_format: "auto" to choose engine on CUDA, openvino on CPU.
  # You can also force "engine" or "openvino".
  #
  # Calibration amount precedence (highest to lowest):
  # 1) num_calibration_batches
  # 2) calibration.num_samples
  # 3) yolo_fraction
  modes: ["YOLO_INT8"]
  precision: ["int8"]
  yolo_format: "auto"
  yolo_data: null
  yolo_fraction: 0.25
  yolo_imgsz: 640
  yolo_batch: 8
  yolo_export_dir: "./results/yolo_exports"
  reuse_yolo_export: true
  compute_detection_drift: true
  num_calibration_batches: 50
  calibration:
    num_samples: null

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["quantization", "int8", "detection", "yolo", "coco"]
    notes: "YOLO INT8 export quantization (OpenVINO/TensorRT) on COCO"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_boxes: true
  save_scores: true
