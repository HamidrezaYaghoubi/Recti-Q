# ResNet50 ImageNet-C worst-case search: Linear-only W4, ALL 15 corruptions @ severity 5.
# Finds the corruption with the largest W4-vs-FP32 drop and Recti-Q recovery there.

experiment:
  name: "imagenet_c_resnet_linear_all"
  description: "ResNet50 ImageNet-C, Linear-only W4, all 15 corruptions @ sev5"
  seed: 42
  device: "cuda"
  num_workers: 8
  debug: false
  debug_samples: 200

models:
  - name: "resnet50"
    architecture: "resnet50"
    weights: "pretrained"
    num_classes: 1000

datasets:
  imagenet:
    name: "imagenet"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet/validation"
    split: "val"
    train_root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet/train/train"
    subset_fraction: 0.05
    subset_seed: 42
    batch_size: 128
    num_workers: 8
    pin_memory: true
  imagenet_c:
    name: "imagenet_c"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet_c"
    corruptions: ["gaussian_noise", "shot_noise", "impulse_noise",
                  "defocus_blur", "glass_blur", "motion_blur", "zoom_blur",
                  "snow", "frost", "fog", "brightness",
                  "contrast", "elastic_transform", "pixelate", "jpeg_compression"]
    severities: [5]
    batch_size: 256
    num_workers: 8
    pin_memory: true

quantization:
  enabled: true
  modes: ["W4"]
  group_size: 128
  use_hqq: true
  quantize_conv: false     # Linear-only (stated method)

rectiq:
  enabled: true
  rank: 64
  alpha: 16.0
  kd_lambda: 1.0
  temperature: 4.0
  epochs: 5
  lr: 0.0003
  weight_decay: 0.0001
  adapter_space: "feature"
  num_workers: 8
  output_dir: "./results/rectiq_adapters"

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: false

output:
  results_dir: "./results"
  checkpoint_dir: "./checkpoints"
