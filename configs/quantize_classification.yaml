# PTQ – Classification Models (torchao, GPU-native)
# Runs FP32 baseline + quantized variants for each model on ImageNet
#
# Available modes: W8A16, W8A8, W4A16, FP8wo, FP8, W4A8fp
#   W8A16  – INT8 weight-only
#   W8A8   – INT8 dynamic activation + INT8 weight
#   W4A16  – INT4 weight-only (group-wise, group_size=128)
#   FP8wo  – Float8 (E4M3) weight-only
#   FP8    – Float8 dynamic activation + Float8 weight
#   W4A8fp – Float8 activation + INT4 weight

experiment:
  name: "quantize_classification"
  description: "PTQ for classification models using torchao (GPU-native)"
  seed: 42
  device: "cuda"
  num_workers: 8
  debug: false
  debug_samples: 100

models:
  - name: "resnet50"
    architecture: "resnet50"
    weights: "IMAGENET1K_V2"
    task: "classification"
    num_classes: 1000

  - name: "mobilenetv2"
    architecture: "mobilenet_v2"
    weights: "IMAGENET1K_V1"
    task: "classification"
    num_classes: 1000

  - name: "vit_base"
    architecture: "vit_b_16"
    weights: "IMAGENET1K_V1"
    task: "classification"
    num_classes: 1000

datasets:
  imagenet:
    name: "imagenet"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet/validation"
    split: "val"
    batch_size: 256
    shuffle: false
    num_workers: 8
    pin_memory: true

quantization:
  enabled: true
  # Full set: ["W8A16", "W8A8", "W4A16", "FP8wo", "FP8", "W4A8fp"]
  # Note: W4A16 and W4A8fp require fbgemm-gpu-genai compatible with your PyTorch version.
  #       FP8wo and FP8 require a GPU with FP8 support (e.g. H100, Ada Lovelace).
  modes: ["W8A16", "W8A8"]

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["quantization", "ptq", "classification", "imagenet", "torchao"]
    notes: "Week 2: Multi-precision PTQ via torchao (GPU-native)"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_logits: true
  save_confidence: true
