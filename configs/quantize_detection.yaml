# INT8 Quantization – Detection Models (Torchvision)
# Runs FP32 baseline + torchao quantized variants for each model on COCO.

experiment:
  name: "quantize_detection"
  description: "INT8 post-training quantization for detection models on COCO"
  seed: 42
  device: "cuda"
  num_workers: 8
  debug: false
  debug_samples: 100

models:
  - name: "fasterrcnn_resnet50"
    architecture: "fasterrcnn_resnet50_fpn_v2"
    weights: "COCO_V1"
    task: "detection"
    num_classes: 91

  - name: "retinanet_resnet50"
    architecture: "retinanet_resnet50_fpn_v2"
    weights: "COCO_V1"
    task: "detection"
    num_classes: 91

datasets:
  coco:
    name: "coco"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/coco"
    split: "val2017"
    batch_size: 8
    shuffle: false
    num_workers: 8
    pin_memory: true
    min_size: 800
    max_size: 1333

quantization:
  enabled: true
  # Default safe mode. INT4 (W4A16) needs fbgemm-gpu-genai >= 1.2.0.
  modes: ["W8A8"]
  precision: ["int8"]
  backend: "x86"
  per_channel: true
  num_calibration_batches: 50
  calibration:
    method: "minmax"
    num_samples: 500
  skip_layers: []

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["quantization", "int8", "detection", "coco"]
    notes: "Week 2: INT8 dynamic quantization for detection models"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_boxes: true
  save_scores: true
