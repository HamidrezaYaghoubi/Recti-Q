# Recti-Q enabled on PTQ-surrogate student (teacher-free)

experiment:
  name: "quantize_bdd100k_yolo_finetuned_rectiq_enabled_no_teacher"
  description: "Recti-Q on PTQ-surrogate INT8 student without teacher on BDD100K fine-tuned YOLOv8"
  seed: 42
  device: "cuda"
  num_workers: 4
  debug: false
  debug_samples: 100

models:
  - name: "yolov8n"
    architecture: "yolov8n"
    weights: "./checkpoints/finetune_bdd100k_yolo/finetune/yolov8n_bdd100k_finetuned_best.pt"
    task: "detection"
    num_classes: 10

  - name: "yolov8m"
    architecture: "yolov8m"
    weights: "./checkpoints/finetune_bdd100k_yolo/finetune/yolov8m_bdd100k_finetuned_best.pt"
    task: "detection"
    num_classes: 10

datasets:
  bdd100k:
    name: "bdd100k"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/bdd100k"
    split: "val"
    batch_size: 64
    shuffle: false
    num_workers: 4
    pin_memory: true

quantization:
  enabled: true
  modes: ["YOLO_INT8"]
  yolo_format: "auto"
  yolo_data: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/bdd100k/data.yaml"
  yolo_fraction: 0.25
  yolo_imgsz: 640
  yolo_batch: 8
  yolo_export_dir: "./results/yolo_exports_finetuned"
  reuse_yolo_export: true
  # Skip FP32 phase wandb runs; keep only Recti-Q enabled runs.
  skip_fp32_phase: true
  compute_detection_drift: true
  # Also log INT8 layer-coverage metrics.
  log_coverage_metrics: true
  num_calibration_batches: 50
  calibration:
    num_samples: null

rectiq:
  enabled: true
  # Run only Recti-Q phase logging for clean run names.
  only: true
  # Skip base quantized eval run in this config.
  skip_base_quant_eval: true
  student_backend: "ptq_surrogate"
  # Teacher-free Recti-Q
  use_teacher: false
  feature_kd_weight: 0.0
  # Keep task supervision active
  task_loss_weight: 1.0
  # Try earlier correction inside neck (one block before Detect-input producers).
  adapter_target: "neck_pre_detect"
  rank: 8
  rank_per_scale: [16, 16, 8]
  alpha: 16.0
  alpha_per_scale: [16.0, 16.0, 8.0]
  epochs: 20
  lr: 0.0003
  cv3_lr: 0.0001
  weight_decay: 0.0001
  residual_reg_weight: 0.0001
  adapter_use_dwconv: true
  adapter_dropout: 0.0
  requantize_after_residual: true
  unfreeze_detect_cv3: true
  train_split: "train"
  val_split: "val"
  train_batch_size: 64
  val_batch_size: 64
  num_workers: 0
  max_batches_per_epoch: null
  # Validate only final epoch.
  val_final_only: true
  imgsz: 640
  ptq_calibration_batches: 50
  ptq_use_ste: true
  recalibration_epoch: 2
  recalibration_batches: 50
  # Disable student-closeness logging.
  compare_to_runtime_export: false
  compare_max_batches: 20
  output_dir: "./results/rectiq_adapters"

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    # Also log model size.
    log_model_size: true
    tags: ["quantization", "int8", "detection", "yolo", "bdd100k", "finetuned", "rectiq-enabled", "no-teacher"]
    notes: "Recti-Q on PTQ-surrogate INT8 student without teacher (BDD100K fine-tuned YOLO)"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_boxes: true
  save_scores: true
