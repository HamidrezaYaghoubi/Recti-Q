# INT8 + PTQ-Surrogate Evaluation (No Recti-Q Training) on Fine-tuned YOLO
#
# Goal:
#   - Build runtime-export INT8 artifact exactly as current pipeline.
#   - Build PTQ-surrogate trainable student.
#   - DO NOT train LoRA (epochs=0).
#   - Evaluate PTQ-surrogate and log closeness vs runtime-export.

experiment:
  name: "quantize_bdd100k_yolo_finetuned_ptq_surrogate_eval"
  description: "INT8 export + PTQ-surrogate evaluation (no Recti-Q training) on BDD100K fine-tuned YOLOv8"
  seed: 42
  device: "cuda"
  num_workers: 4
  debug: false
  debug_samples: 100

models:
  - name: "yolov8n"
    architecture: "yolov8n"
    weights: "./checkpoints/finetune_bdd100k_yolo/finetune/yolov8n_bdd100k_finetuned_best.pt"
    task: "detection"
    num_classes: 10

  - name: "yolov8m"
    architecture: "yolov8m"
    weights: "./checkpoints/finetune_bdd100k_yolo/finetune/yolov8m_bdd100k_finetuned_best.pt"
    task: "detection"
    num_classes: 10

datasets:
  bdd100k:
    name: "bdd100k"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/bdd100k"
    split: "val"
    batch_size: 64
    shuffle: false
    num_workers: 4
    pin_memory: true

quantization:
  enabled: true
  modes: ["YOLO_INT8"]
  yolo_format: "auto"
  yolo_data: null
  yolo_fraction: 0.25
  yolo_imgsz: 640
  yolo_batch: 8
  yolo_export_dir: "./results/yolo_exports_finetuned"
  reuse_yolo_export: true
  compute_detection_drift: true
  num_calibration_batches: 50
  calibration:
    num_samples: null

rectiq:
  # Must be true to activate PTQ-surrogate path in current pipeline.
  enabled: true
  # Keep only Recti-Q phase run in wandb (no separate FP32/base INT8 phase runs here).
  only: true
  # Skip base quantized evaluation; we only need PTQ-surrogate eval in this run.
  skip_base_quant_eval: true
  student_backend: "ptq_surrogate"
  # No LoRA training: evaluate raw PTQ-surrogate behavior.
  epochs: 0
  use_teacher: false
  feature_kd_weight: 0.0
  # Keep >0 for valid detection-loss signal definition in Recti-Q loop.
  task_loss_weight: 1.0
  rank: 8
  alpha: 16.0
  lr: 0.0003
  weight_decay: 0.0001
  residual_reg_weight: 0.0001
  train_split: "train"
  val_split: "val"
  train_batch_size: 8
  val_batch_size: 8
  num_workers: 0
  ptq_calibration_batches: 50
  ptq_use_ste: true
  # This is your automatic double-check against runtime-export INT8.
  compare_to_runtime_export: true
  compare_max_batches: 20
  max_batches_per_epoch: null
  imgsz: 640
  output_dir: "./results/rectiq_adapters"

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["quantization", "int8", "detection", "yolo", "bdd100k", "finetuned", "ptq-surrogate", "no-rectiq-train"]
    notes: "INT8 export + PTQ-surrogate eval only (epochs=0, no LoRA training)"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_boxes: true
  save_scores: true

