# ImageNet-C Robustness Evaluation Configuration
# This config runs FP32 inference on ImageNet-C (corrupted images)

experiment:
  name: "baseline_imagenet_c"
  description: "Baseline FP32 inference on ImageNet-C for robustness evaluation"
  seed: 42
  device: "cuda"
  num_workers: 8
  debug: false
  debug_samples: 100

models:
  - name: "resnet50"
    architecture: "resnet50"
    weights: "IMAGENET1K_V2"
    task: "classification"
    num_classes: 1000
  
  - name: "mobilenetv2"
    architecture: "mobilenet_v2"
    weights: "IMAGENET1K_V1"
    task: "classification"
    num_classes: 1000
  
  - name: "vit_base"
    architecture: "vit_b_16"
    weights: "IMAGENET1K_V1"
    task: "classification"
    num_classes: 1000

datasets:
  imagenet_c:
    name: "imagenet_c"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet_c"
    batch_size: 64
    shuffle: false
    num_workers: 8
    pin_memory: true
    
    # Corruption types to evaluate
    corruptions:
      # Noise
      - "gaussian_noise"
      - "shot_noise"
      - "impulse_noise"
      # Blur
      - "defocus_blur"
      - "glass_blur"
      - "motion_blur"
      - "zoom_blur"
      # Weather
      - "snow"
      - "frost"
      - "fog"
      - "brightness"
      # Digital
      - "contrast"
      - "elastic_transform"
      - "pixelate"
      - "jpeg_compression"
    
    # Severity levels (1-5, where 5 is most severe)
    severities: [1, 2, 3, 4, 5]

quantization:
  enabled: false
  precision: ["int8"]
  calibration:
    method: "minmax"
    num_samples: 1000

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["baseline", "fp32", "imagenet-c", "robustness"]
    notes: "Week 1: Baseline FP32 inference on ImageNet-C"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_logits: true
  save_confidence: true
