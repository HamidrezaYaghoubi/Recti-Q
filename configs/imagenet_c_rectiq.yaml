# Recti-Q on ImageNet-C: FP32 -> W4 PTQ -> Recti-Q adapter.
# Adapter trained on a 5% class-balanced ImageNet-1k train subsample (source-only),
# validated on ImageNet val, evaluated on ImageNet-C corruptions at severity 5.

experiment:
  name: "imagenet_c_rectiq"
  description: "Recti-Q feature-space rectification on ImageNet-C (W4 HQQ PTQ)"
  seed: 42
  device: "cuda"
  num_workers: 8
  debug: false
  debug_samples: 200

models:
  - name: "resnet50"
    architecture: "resnet50"
    weights: "pretrained"
    num_classes: 1000
  - name: "deit_tiny"
    architecture: "deit_tiny_patch16_224"
    weights: "pretrained"
    num_classes: 1000
  - name: "deit_small"
    architecture: "deit_small_patch16_224"
    weights: "pretrained"
    num_classes: 1000
  - name: "deit_base"
    architecture: "deit_base_patch16_224"
    weights: "pretrained"
    num_classes: 1000

datasets:
  # ImageNet-1k: validation = ID; train (via train_root) = source for the 5% subset.
  imagenet:
    name: "imagenet"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet"
    split: "validation"
    train_root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet/train"
    subset_fraction: 0.05
    subset_balanced: true
    subset_seed: 42
    batch_size: 128
    num_workers: 8
    pin_memory: true
  # ImageNet-C: OOD evaluation (worst-case severity 5 on representative corruptions).
  imagenet_c:
    name: "imagenet_c"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/imagenet_c"
    corruptions: ["contrast", "gaussian_noise", "shot_noise", "impulse_noise"]
    severities: [5]
    batch_size: 256
    num_workers: 8
    pin_memory: true

quantization:
  enabled: true
  modes: ["W4"]
  group_size: 128
  use_hqq: true

rectiq:
  enabled: true
  rank: 64
  alpha: 16.0
  kd_lambda: 1.0        # 0.0 => teacher-free (CE only)
  temperature: 4.0
  epochs: 5
  lr: 0.0003
  weight_decay: 0.0001
  adapter_space: "feature"   # "logit" for the ablation baseline
  num_workers: 8
  output_dir: "./results/rectiq_adapters"

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  wandb:
    enabled: true
    project: "recti-q"
    entity: null
    tags: ["recti-q", "imagenet-c", "w4", "hqq"]
    notes: "Recti-Q on ImageNet-C (W4 HQQ PTQ baseline)"

output:
  results_dir: "./results"
  checkpoint_dir: "./checkpoints"
