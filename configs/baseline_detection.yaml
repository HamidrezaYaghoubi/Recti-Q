# Baseline Detection Experiment Configuration (Future)
# This config is a placeholder for COCO object detection experiments

experiment:
  name: "baseline_detection"
  description: "Baseline FP32 inference on COCO 2017 for object detection"
  seed: 42
  device: "cuda"
  num_workers: 8
  debug: false
  debug_samples: 100

models:
  # TODO: Week 2-3 - Add detection models
  - name: "fasterrcnn_resnet50"
    architecture: "fasterrcnn_resnet50_fpn_v2"
    weights: "COCO_V1"
    task: "detection"
    num_classes: 91  # COCO has 91 classes (including background)
  
  - name: "retinanet_resnet50"
    architecture: "retinanet_resnet50_fpn_v2"
    weights: "COCO_V1"
    task: "detection"
    num_classes: 91

datasets:
  coco:
    name: "coco"
    root: "/fs/nexus-projects/pc_driving/yaghoubi/datasets/coco"
    split: "val2017"
    batch_size: 8
    shuffle: false
    num_workers: 8
    pin_memory: true
    
    # Detection-specific settings
    min_size: 800
    max_size: 1333

quantization:
  enabled: false
  precision: ["int8"]
  calibration:
    method: "minmax"
    num_samples: 1000

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "./logs"
  
  wandb:
    enabled: true
    project: "quantization-decision-analysis"
    entity: null
    tags: ["baseline", "fp32", "detection", "coco"]
    notes: "Baseline FP32 inference on COCO 2017"

output:
  save_predictions: true
  prediction_format: "pickle"
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  save_boxes: true  # Save bounding boxes
  save_scores: true  # Save detection scores
